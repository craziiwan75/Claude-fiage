name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 121.196.169.32 >> ~/.ssh/known_hosts

      - name: Build backend image
        run: docker build -t gongfeng-backend:latest ./backend

      - name: Transfer image to server via SSH
        run: |
          docker save gongfeng-backend:latest | gzip | \
            ssh -i ~/.ssh/deploy_key root@121.196.169.32 "gunzip | docker load"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key root@121.196.169.32 bash << 'ENDSSH'
            set -e
            DEPLOY_DIR=/opt/gongfeng-app

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/craziiwan75/Claude-fiage.git $DEPLOY_DIR
            fi

            cd $DEPLOY_DIR
            git pull origin main
            docker compose up -d
            echo "Deployment complete"
          ENDSSH
