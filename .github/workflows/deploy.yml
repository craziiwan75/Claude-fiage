name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-humtme11he2862ru.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: crpi-humtme11he2862ru.cn-hangzhou.personal.cr.aliyuncs.com/gongfeng/gongfeng-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR=/opt/gongfeng-app

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/craziiwan75/Claude-fiage.git $DEPLOY_DIR
            fi

            cd $DEPLOY_DIR
            git pull origin main

            docker login --username=${{ secrets.ACR_USERNAME }} \
              --password=${{ secrets.ACR_PASSWORD }} \
              crpi-humtme11he2862ru.cn-hangzhou.personal.cr.aliyuncs.com

            docker compose pull backend
            docker compose up -d

            echo "Deployment complete"
