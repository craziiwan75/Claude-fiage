services:
  mysql:
    image: mysql:8.0
    container_name: gongfeng-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: gongfeng
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  backend:
    image: crpi-humtme11he2862ru.cn-hangzhou.personal.cr.aliyuncs.com/gongfeng/gongfeng-backend:latest
    container_name: gongfeng-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:rootpass@mysql:3306/gongfeng?charset=utf8mb4
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_HOURS: "2"
      CORS_ORIGINS: "*"
      LOG_DIR: /app/logs
    depends_on:
      - mysql
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs

volumes:
  mysql-data:
